<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outreach Leads</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6366f1;
      --accent-dim: #4f52c4;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --tag-email: #1e3a5f;
      --tag-email-text: #93c5fd;
      --tag-linkedin: #1e3450;
      --tag-linkedin-text: #7dd3fc;
      --tag-phone: #1a3a2a;
      --tag-phone-text: #86efac;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .header p { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .stat-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .stat-pill span { color: var(--text); font-weight: 600; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 20px 32px 0;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 400px;
    }
    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }

    .btn-refresh {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { background: var(--accent-dim); }
    .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Content ── */
    .content { padding: 20px 32px 40px; }

    /* ── Table wrapper ── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }

    thead tr { background: var(--surface); }
    th {
      text-align: left;
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td { padding: 14px 16px; vertical-align: top; }

    /* ── Company cell ── */
    .company-cell { min-width: 200px; }
    .company-name { font-weight: 600; font-size: 14px; color: var(--text); }
    .company-site {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      display: flex; align-items: center; gap: 4px;
    }
    .company-site a { color: var(--muted); text-decoration: none; }
    .company-site a:hover { color: var(--accent); }
    .contact-name { font-size: 12px; color: var(--text); margin-top: 6px; font-weight: 500; }
    .contact-title { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Score cell ── */
    .score-cell { min-width: 80px; text-align: center; }
    .score-ring {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      font-size: 15px;
      font-weight: 700;
      border: 2.5px solid;
    }
    .score-high { border-color: var(--green); color: var(--green); }
    .score-mid  { border-color: var(--yellow); color: var(--yellow); }
    .score-low  { border-color: var(--red); color: var(--red); }

    /* ── Reason cell ── */
    .reason-cell { min-width: 280px; max-width: 380px; }
    .reason-text { color: var(--text); line-height: 1.55; }
    .fit-reasoning { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

    /* ── Contact modes cell ── */
    .contact-cell { min-width: 160px; }
    .contact-modes { display: flex; flex-direction: column; gap: 6px; }
    .contact-tag {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 500;
      width: fit-content;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tag-email    { background: var(--tag-email);    color: var(--tag-email-text); }
    .tag-linkedin { background: var(--tag-linkedin);  color: var(--tag-linkedin-text); }
    .tag-phone    { background: var(--tag-phone);     color: var(--tag-phone-text); }
    .contact-tag a { color: inherit; text-decoration: none; }
    .contact-tag a:hover { text-decoration: underline; }
    .no-contact { color: var(--muted); font-size: 12px; }

    /* ── LinkedIn column ── */
    .linkedin-cell { min-width: 150px; }
    .linkedin-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: #0a66c2;
      color: #fff;
      border-radius: 6px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .linkedin-btn:hover { background: #0856a8; }
    .linkedin-na { color: var(--muted); font-size: 12px; }

    /* ── Job cell ── */
    .job-cell { min-width: 140px; }
    .job-title { font-weight: 500; color: var(--text); }
    .job-url a { font-size: 11px; color: var(--muted); text-decoration: none; margin-top: 4px; display: block; }
    .job-url a:hover { color: var(--accent); }

    /* ── Tech cell ── */
    .tech-cell { min-width: 140px; }
    .tech-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tech-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 14px; line-height: 1.6; }
    .empty code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 18px;
      font-family: monospace;
      font-size: 13px;
      display: inline-block;
      margin-top: 14px;
      color: var(--accent);
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }
    .dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🎯</div>
    <div>
      <h1>Outreach Leads</h1>
      <p>AI-discovered prospects for text-to-SQL consultancy</p>
    </div>
  </div>
  <div class="stat-pill">
    Total: <span id="total-count">—</span> leads
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" type="text" id="search" placeholder="Search company, contact, reason…" />
  </div>

  <select id="score-filter">
    <option value="">All scores</option>
    <option value="high">High fit (8–10)</option>
    <option value="mid">Medium fit (5–7)</option>
    <option value="low">Low fit (1–4)</option>
  </select>

  <select id="contact-filter">
    <option value="">All contacts</option>
    <option value="email">Has email</option>
    <option value="linkedin">Has LinkedIn</option>
  </select>

  <button class="btn-refresh" id="refresh-btn" onclick="loadLeads()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Refresh
  </button>
</div>

<div class="content">
  <div id="table-container">
    <div class="loading"><span class="dots">Loading leads</span></div>
  </div>
</div>

<script>
  let allLeads = [];

  async function loadLeads() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      const resp = await fetch('/api/leads');
      const data = await resp.json();
      allLeads = data.leads || [];
      renderTable(filterLeads());
    } catch (e) {
      document.getElementById('table-container').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <h3>Could not load leads</h3>
          <p>Make sure <code>python server.py</code> is running.</p>
        </div>`;
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function filterLeads() {
    const q = document.getElementById('search').value.toLowerCase();
    const scoreF = document.getElementById('score-filter').value;
    const contactF = document.getElementById('contact-filter').value;

    return allLeads.filter(lead => {
      // Text search
      const matchText = !q ||
        (lead.company || '').toLowerCase().includes(q) ||
        (lead.contact_name || '').toLowerCase().includes(q) ||
        (lead.reason_to_reach_out || '').toLowerCase().includes(q) ||
        (lead.job_title || '').toLowerCase().includes(q);

      // Score filter
      const score = parseInt(lead.fit_score) || 0;
      const matchScore = !scoreF ||
        (scoreF === 'high' && score >= 8) ||
        (scoreF === 'mid'  && score >= 5 && score <= 7) ||
        (scoreF === 'low'  && score <= 4);

      // Contact filter
      const matchContact = !contactF ||
        (contactF === 'email'    && lead.contact_email) ||
        (contactF === 'linkedin' && lead.contact_linkedin);

      return matchText && matchScore && matchContact;
    });
  }

  function scoreClass(s) {
    const n = parseInt(s) || 0;
    if (n >= 8) return 'score-high';
    if (n >= 5) return 'score-mid';
    return 'score-low';
  }

  function linkedinCell(lead) {
    if (!lead.contact_linkedin) return `<span class="linkedin-na">—</span>`;
    const url = lead.contact_linkedin.startsWith('http')
      ? lead.contact_linkedin
      : `https://${lead.contact_linkedin}`;
    return `
      <a class="linkedin-btn" href="${esc(url)}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
        </svg>
        View Profile
      </a>`;
  }

  function contactModes(lead) {
    const modes = [];

    if (lead.contact_email) {
      modes.push(`
        <div class="contact-tag tag-email">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <a href="mailto:${esc(lead.contact_email)}" title="${esc(lead.contact_email)}">${esc(lead.contact_email)}</a>
        </div>`);
    }

    if (lead.contact_phone) {
      modes.push(`
        <div class="contact-tag tag-phone">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3-8.59A2 2 0 0 1 3.7 1.31h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l1.06-1.06a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          ${esc(lead.contact_phone)}
        </div>`);
    }

    if (modes.length === 0) {
      return `<span class="no-contact">No contact found</span>`;
    }
    return `<div class="contact-modes">${modes.join('')}</div>`;
  }

  function techTags(tech) {
    if (!tech) return '—';
    const tags = tech.split(',').map(t => t.trim()).filter(Boolean);
    if (!tags.length) return '—';
    return `<div class="tech-tags">${tags.map(t => `<span class="tech-tag">${t}</span>`).join('')}</div>`;
  }

  function renderTable(leads) {
    document.getElementById('total-count').textContent = leads.length;

    if (!leads.length) {
      const isFiltered = document.getElementById('search').value ||
                         document.getElementById('score-filter').value ||
                         document.getElementById('contact-filter').value;
      document.getElementById('table-container').innerHTML = `
        <div class="empty">
          <div class="empty-icon">${isFiltered ? '🔍' : '📭'}</div>
          <h3>${isFiltered ? 'No leads match your filters' : 'No leads yet'}</h3>
          <p>${isFiltered
            ? 'Try adjusting your search or filters.'
            : 'Run the agent to discover leads.'}</p>
          ${!isFiltered ? `<code>python agent.py --query "Analytics Engineer" --max-leads 10</code>` : ''}
        </div>`;
      return;
    }

    const rows = leads.map(lead => `
      <tr>
        <td class="company-cell">
          <div class="company-name">${esc(lead.company || '—')}</div>
          ${lead.company_website
            ? `<div class="company-site">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <a href="${esc(lead.company_website)}" target="_blank" rel="noopener">${esc(domain(lead.company_website))}</a>
              </div>`
            : ''}
          ${lead.contact_name
            ? `<div class="contact-name">${esc(lead.contact_name)}</div>
               <div class="contact-title">${esc(lead.contact_title || '')}</div>`
            : ''}
        </td>

        <td class="score-cell">
          <div class="score-ring ${scoreClass(lead.fit_score)}">
            ${lead.fit_score || '?'}
          </div>
        </td>

        <td class="reason-cell">
          <div class="reason-text">${esc(lead.reason_to_reach_out || '—')}</div>
          ${lead.fit_reasoning
            ? `<div class="fit-reasoning">${esc(lead.fit_reasoning)}</div>`
            : ''}
        </td>

        <td class="contact-cell">${contactModes(lead)}</td>

        <td class="linkedin-cell">${linkedinCell(lead)}</td>

        <td class="job-cell">
          <div class="job-title">${esc(lead.job_title || '—')}</div>
          ${lead.job_url
            ? `<div class="job-url"><a href="${esc(lead.job_url)}" target="_blank" rel="noopener">View posting ↗</a></div>`
            : ''}
        </td>

        <td class="tech-cell">${techTags(lead.tech_stack)}</td>
      </tr>
    `).join('');

    document.getElementById('table-container').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Company / Contact</th>
              <th>Fit</th>
              <th>Why Reach Out</th>
              <th>Email / Phone</th>
              <th>LinkedIn</th>
              <th>Job Signal</th>
              <th>Tech Stack</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function domain(url) {
    try { return new URL(url).hostname.replace('www.', ''); }
    catch { return url; }
  }

  // Reactively filter on input change
  ['search', 'score-filter', 'contact-filter'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => renderTable(filterLeads()));
  });

  // Initial load
  loadLeads();

  // Auto-refresh every 15s while agent is running
  setInterval(loadLeads, 15000);
</script>
</body>
</html>
